name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main   # change to master if that's your default branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          # NOTE: add a NEW service-account secret for project school-suite-652d8 in
          # repo Settings > Secrets before this runs — the old secret won't auth here.
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SCHOOL_SUITE }}
          projectId: school-suite-652d8
          target: bookware
          channelId: live
          entryPoint: ./mysite

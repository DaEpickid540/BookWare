<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookWare – Teacher Signup</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
      #signInBtn:hover:not(:disabled) { background: #c0392b !important; }
      #signInBtn:disabled { opacity: 0.45 !important; cursor: not-allowed !important; }
      #statusMessage.error   { color: #e74c3c !important; }
      #statusMessage.success { color: #2ecc71 !important; }
      #statusMessage.info    { color: #3498db !important; }
    </style>
  </head>
  <body style="margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1a1a1e;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">

    <div style="background:#242428;border:1px solid #3a3a42;border-radius:14px;padding:2.6rem 2.2rem;max-width:400px;width:calc(100% - 2rem);text-align:center;box-shadow:0 18px 40px rgba(0,0,0,0.5);animation:fadeUp 0.28s ease-out">

      <!-- BookWare logo -->
      <div style="display:inline-flex;align-items:center;gap:8px;margin-bottom:1.6rem">
        <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#e74c3c;box-shadow:0 0 10px rgba(231,76,60,0.55);flex-shrink:0"></span>
        <span style="font-size:1.05rem;font-weight:700;color:#f0f0f0;letter-spacing:0.05em;text-transform:uppercase">BookWare</span>
      </div>

      <!-- Heading -->
      <h1 style="font-size:1.3rem;font-weight:700;color:#f0f0f0;margin:0 0 0.4rem;line-height:1.2">Teacher Invite</h1>
      <p style="color:#ababab;font-size:0.85rem;margin:0 0 1.6rem;line-height:1.55">You've been invited to join as a teacher.<br>Sign in with Google to claim your account.</p>

      <!-- Status message -->
      <div id="statusMessage" class="info" style="margin-bottom:1.3rem;min-height:1.1rem;font-size:0.85rem;color:#3498db;transition:color 0.2s"></div>

      <!-- Google sign-in button -->
      <button id="signInBtn" disabled style="display:inline-flex;align-items:center;justify-content:center;gap:0.65rem;background:#e74c3c;color:#fff;border:none;border-radius:8px;padding:0.75rem 1.5rem;font-size:0.9rem;font-weight:600;cursor:pointer;transition:background 0.18s,opacity 0.18s;width:100%;letter-spacing:0.01em">
        <svg width="17" height="17" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span id="btnLabel">Sign in with Google</span>
      </button>

      <!-- Footer note -->
      <p style="margin:1.5rem 0 0;font-size:0.7rem;color:#7a7a7a;line-height:1.5">
        <i class="bi bi-shield-lock-fill" style="margin-right:3px;color:#3a3a42"></i>
        Secured · Mason City Schools · BookWare
      </p>

    </div>

    <script type="module" src="/js/teacher-signup.js"></script>
  </body>
</html>

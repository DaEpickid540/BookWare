<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="14" fill="#1a1a1e"/>
  <!-- Book shape -->
  <rect x="14" y="18" width="22" height="28" rx="2" fill="#2d2d38"/>
  <rect x="16" y="20" width="18" height="24" rx="1" fill="#22222a"/>
  <!-- Spine -->
  <rect x="14" y="18" width="4" height="28" rx="1" fill="#3d3d4a"/>
  <!-- Red dot accent -->
  <circle cx="46" cy="22" r="9" fill="#e74c3c" filter="url(#glow)"/>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Pages lines -->
  <line x1="20" y1="27" x2="30" y2="27" stroke="#3d3d4a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="31" x2="30" y2="31" stroke="#3d3d4a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="35" x2="27" y2="35" stroke="#3d3d4a" stroke-width="1.5" stroke-linecap="round"/>
</svg>
